<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酸鹼中和滴定台</title>
</head>
<body>
<script src="instrument.js"></script>
<script>
/* ===== 酸鹼中和滴定台 · 108課綱 Jc-Ⅳ 酸鹼中和與 pH ===== */
const ACIDS={
  A:{Ca:0.10,Va:20,label:'0.10 M HCl 20 mL'},
  B:{Ca:0.20,Va:15,label:'0.20 M HCl 15 mL'},
  C:{Ca:0.05,Va:40,label:'0.05 M HCl 40 mL'},
};
let acidKey='A';

const ui=buildInstrument({
  title:'酸鹼中和滴定台',
  tag:'Jc-Ⅳ 酸鹼中和',
  brief:'調整濃度與體積，然後提交驗證',
  readouts:[
    {id:'ro_na',  label:'酸 H⁺ 莫耳數'},
    {id:'ro_nb',  label:'鹼 OH⁻ 莫耳數'},
    {id:'ro_ex',  label:'過量'},
    {id:'ro_ph',  label:'預估 pH'},
    {id:'ro_state',label:'中和狀態'},
  ],
  views:[
    {id:'beaker', label:'滴定裝置'},
    {id:'curve',  label:'滴定曲線'},
    {id:'moles',  label:'莫耳數比較'},
  ],
  deckHTML:
    knob('conc','NaOH 濃度',5,50,5,5,'') +
    knob('vol','滴入體積',0,50,1,10,' mL') +
    `<div class="knob"><label>酸的配置</label>
      <select id="acid" style="background:#0a1426;color:#7fdcff;border:1px solid #1e3a5f;
        border-radius:5px;padding:4px 7px;font-size:11.5px">
        <option value="A">0.10M × 20mL</option>
        <option value="B">0.20M × 15mL</option>
        <option value="C">0.05M × 40mL</option>
      </select></div>` +
    toggle('tg_ind','顯示指示劑顏色',true)
});
const cv=ui.cv,ctx=cv.getContext('2d');
const hintLog=makeHintLog(ui);
const cap=makeCap(ui,()=>{ui.status.textContent='此機台強化已達上限，仍可自由練習';ui.status.className='hint';});
const views=makeViews(ui,()=>draw());
const showInd=wireToggle('tg_ind',()=>draw());

let W,H,solved=false,applied=false,tested=false,failCount=0;
function acid(){return ACIDS[acidKey];}
function nAcid(){return acid().Ca*acid().Va;}
function Cb(){return (+document.getElementById('conc').value)/100;}
function Vb(){return +document.getElementById('vol').value;}
function nBase(){return Cb()*Vb();}
function excess(){return nBase()-nAcid();}
function pH(){
  const d=excess(), Vt=acid().Va+Vb();
  if(Math.abs(d)<1e-9)return 7;
  if(d<0){const c=(-d)/Vt;return Math.max(0.5,-Math.log10(c));}
  const c=d/Vt;return Math.min(13.5,14+Math.log10(c));
}
function mode(){const d=excess();
  if(Math.abs(d)<1e-9)return'ok';return d<0?'acid':'base';}

document.getElementById('acid').onchange=e=>{acidKey=e.target.value;reset();};
wireKnobs((id,v)=>{ setKnobRD(id, id==='conc'?(v/100).toFixed(2)+' M':v+' mL'); reset(); });

function reset(){solved=false;applied=false;tested=false;
  if(!cap.full)ui.apply.disabled=true;refresh();}
function refresh(){updateRO();draw();}
function updateRO(){
  const m=mode(),p=pH();
  setRO('ro_na',`${acid().Ca} × ${acid().Va} = ${nAcid().toFixed(2)} mmol`,'amber');
  setRO('ro_nb',`${Cb().toFixed(2)} × ${Vb()} = ${nBase().toFixed(2)} mmol`,'violet');
  const ex=excess();
  setRO('ro_ex', Math.abs(ex)<1e-9?'無（恰好中和）':(ex<0?`酸多 ${(-ex).toFixed(2)} mmol`:`鹼多 ${ex.toFixed(2)} mmol`),
    Math.abs(ex)<1e-9?'green':'red');
  setRO('ro_ph', p.toFixed(2), m==='ok'?'green':'red');
  setRO('ro_state', tested?({ok:'恰好中和',acid:'酸性',base:'鹼性'}[m])+'（已驗證）'
    :({ok:'恰好中和',acid:'酸性',base:'鹼性'}[m])+'（預測）', m==='ok'?'green':'red');
}
function progressiveHint(){
  const n=failCount,m=mode(),p=pH();
  if(n<2)return;
  const obs=m==='acid'?`溶液仍呈酸性（pH ≈ ${p.toFixed(1)}），酸還沒被中和完`
                      :`溶液已呈鹼性（pH ≈ ${p.toFixed(1)}），鹼加太多了`;
  let lv,msg;
  if(n===2){lv=1;
    msg=`${obs}。酸鹼中和的本質是酸提供的 H⁺ 與鹼提供的 OH⁻「一對一」結合成水。`
      + `想一想：要恰好中和，兩者的「數量」應該有什麼關係？`
      + `<br><span style="opacity:.8">可切到「莫耳數比較」檢視，直接比較兩根長條。</span>`;
  } else if(n===3){lv=2;
    msg=`關鍵是比較「H⁺ 的莫耳數」與「OH⁻ 的莫耳數」，而不是比較體積或濃度。`
      + `莫耳數 = 濃度 × 體積。目前你加入的鹼${m==='acid'?'不足':'過多'}，`
      + `請調整「濃度」或「體積」，讓鹼的莫耳數${m==='acid'?'增加':'減少'}。`;
  } else {lv=3;
    msg=`中和條件為 Cₐ × Vₐ = C_b × V_b。酸的部分是固定的：`
      + `${acid().Ca} M × ${acid().Va} mL = ${nAcid().toFixed(2)} mmol 的 H⁺。`
      + `目前你的鹼是 ${Cb().toFixed(2)} × ${Vb()} = ${nBase().toFixed(2)} mmol。`
      + `請讓「鹼的濃度 × 體積」恰好等於 ${nAcid().toFixed(2)}。`;
  }
  hintLog.add(lv,n,msg);
}
function phColor(p){
  if(!showInd()) return 'rgba(148,163,184,0.35)';
  if(p<6)return `rgb(${Math.min(225,190+(6-p)*8)},70,80)`;
  if(p>8)return 'rgb(96,80,200)';
  if(Math.abs(p-7)<0.4)return '#4ade80';
  return '#a3e635';
}
function resize(){const v=document.getElementById('viewport');
  W=cv.width=v.clientWidth;H=cv.height=v.clientHeight;draw();}
window.addEventListener('resize',resize);
function draw(){if(!W)return;ctx.clearRect(0,0,W,H);
  const v=views.current;
  if(v==='curve'){drawCurve();return;} if(v==='moles'){drawMoles();return;} drawBeaker();}

function drawBeaker(){
  const bx=W*0.42,bkW=W*0.22,bkH=H*0.4,by=H*0.86;
  const burTop=H*0.06,burH=H*0.3;
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=2;ctx.strokeRect(bx-11,burTop,22,burH);
  const fh=burH*Math.min(1,Vb()/50);
  ctx.fillStyle='rgba(147,197,253,0.55)';ctx.fillRect(bx-9,burTop+burH-fh,18,fh);
  ctx.fillStyle='#cbd5e1';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText(`NaOH ${Cb().toFixed(2)} M`,bx,burTop-6);
  ctx.fillText(`${Vb()} mL`,bx,burTop+burH+14);
  ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(bx,burTop+burH);ctx.lineTo(bx,burTop+burH+10);ctx.stroke();
  if(tested){ctx.fillStyle='#93c5fd';ctx.beginPath();ctx.arc(bx,burTop+burH+20,4,0,Math.PI*2);ctx.fill();}
  const solTop=by-bkH*0.7;
  ctx.strokeStyle='#7fdcff';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(bx-bkW/2,by-bkH);ctx.lineTo(bx-bkW/2,by);
  ctx.lineTo(bx+bkW/2,by);ctx.lineTo(bx+bkW/2,by-bkH);ctx.stroke();
  const p=pH();
  ctx.fillStyle=tested?phColor(p):'rgba(148,163,184,0.3)';ctx.globalAlpha=0.78;
  ctx.fillRect(bx-bkW/2+2,solTop,bkW-4,by-solTop-2);ctx.globalAlpha=1;
  ctx.fillStyle='#cbd5e1';ctx.font='11px sans-serif';
  ctx.fillText(acid().label,bx,by+18);
  // pH 標尺
  const sx=W*0.75,sy=H*0.14,sh=H*0.62;
  for(let i=0;i<=14;i++){const yy=sy+sh*(i/14);
    ctx.fillStyle=phColor(i);ctx.fillRect(sx,yy-sh/28,18,sh/14);}
  ctx.strokeStyle='#475569';ctx.lineWidth=1;ctx.strokeRect(sx,sy-sh/28,18,sh+sh/28);
  if(tested){const py=sy+sh*(p/14);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx-7,py);ctx.lineTo(sx+25,py);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='left';
    ctx.fillText(`pH ${p.toFixed(1)}`,sx+30,py+4);}
  ctx.fillStyle='#8ba7c4';ctx.font='10px sans-serif';ctx.textAlign='right';
  ctx.fillText('0 酸',sx-4,sy+6);ctx.fillText('7 中性',sx-4,sy+sh/2+4);ctx.fillText('14 鹼',sx-4,sy+sh);
  ctx.textAlign='left';
}
function drawCurve(){
  const ox=W*0.13,oy=H*0.85,gw=W*0.74,gh=H*0.68;
  ctx.strokeStyle='#475569';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ox,oy-gh);ctx.lineTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('滴入 NaOH 體積 (mL)',ox+gw/2,oy+28);
  ctx.save();ctx.translate(ox-30,oy-gh/2);ctx.rotate(-Math.PI/2);ctx.fillText('pH',0,0);ctx.restore();
  for(let i=0;i<=14;i+=2){const py=oy-gh*(i/14);
    ctx.strokeStyle='#1e293b';ctx.beginPath();ctx.moveTo(ox,py);ctx.lineTo(ox+gw,py);ctx.stroke();
    ctx.fillStyle='#64748b';ctx.textAlign='right';ctx.fillText(i,ox-6,py+4);}
  ctx.textAlign='center';
  for(let v=0;v<=50;v+=10){const px=ox+gw*(v/50);
    ctx.fillStyle='#64748b';ctx.fillText(v,px,oy+15);}
  // pH=7 線
  const y7=oy-gh*(7/14);
  ctx.strokeStyle='rgba(74,222,128,0.55)';ctx.setLineDash([6,5]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ox,y7);ctx.lineTo(ox+gw,y7);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#4ade80';ctx.textAlign='left';ctx.fillText('pH = 7（中和點）',ox+6,y7-6);
  // 曲線（目前濃度下 pH vs Vb）
  ctx.strokeStyle='#7fdcff';ctx.lineWidth=2.5;ctx.beginPath();
  let first=true;
  for(let v=0;v<=50;v+=0.5){
    const nb=Cb()*v, d=nb-nAcid(), Vt=acid().Va+v;
    let p;
    if(Math.abs(d)<1e-9)p=7;
    else if(d<0)p=Math.max(0.5,-Math.log10((-d)/Vt));
    else p=Math.min(13.5,14+Math.log10(d/Vt));
    const px=ox+gw*(v/50),py=oy-gh*(p/14);
    if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // 目前點
  const px=ox+gw*(Vb()/50),py=oy-gh*(pH()/14);
  ctx.fillStyle=mode()==='ok'?'#4ade80':'#f87171';
  ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#e2e8f0';ctx.textAlign='center';
  ctx.fillText(`${Vb()} mL, pH ${pH().toFixed(1)}`,px,py-12);
  ctx.fillStyle='#8ba7c4';
  ctx.fillText('注意：中和點附近 pH 急遽變化（當量點躍升）',ox+gw/2,oy-gh-8);
  ctx.textAlign='left';
}
function drawMoles(){
  const base=H*0.82,bw=Math.min(88,W*0.11);
  const maxN=Math.max(nAcid(),nBase(),1)*1.3;
  const sc=(H*0.6)/maxN;
  const bar=(x,val,col,lab,sub)=>{
    const h=val*sc;
    ctx.fillStyle=col;ctx.fillRect(x-bw/2,base-h,bw,h);
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;ctx.strokeRect(x-bw/2,base-h,bw,h);
    ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(val.toFixed(2),x,base-h-10);
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText(lab,x,base+20);
    ctx.fillStyle='#64748b';ctx.font='10px sans-serif';ctx.fillText(sub,x,base+36);
  };
  bar(W*0.36,nAcid(),'#f59e0b','H⁺ (酸)',`${acid().Ca} M × ${acid().Va} mL`);
  bar(W*0.64,nBase(),'#a78bfa','OH⁻ (鹼)',`${Cb().toFixed(2)} M × ${Vb()} mL`);
  ctx.strokeStyle='rgba(74,222,128,0.5)';ctx.setLineDash([6,5]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W*0.22,base-nAcid()*sc);ctx.lineTo(W*0.78,base-nAcid()*sc);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#4ade80';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('目標：鹼的長條要對齊此線',W*0.22,base-nAcid()*sc-8);
  ctx.textAlign='center';ctx.font='13px sans-serif';
  const m=mode();
  ctx.fillStyle=m==='ok'?'#4ade80':'#fca5a5';
  ctx.fillText(m==='ok'?'n(H⁺) = n(OH⁻) → 恰好中和'
    :(m==='acid'?`鹼不足 ${(nAcid()-nBase()).toFixed(2)} mmol`:`鹼過量 ${(nBase()-nAcid()).toFixed(2)} mmol`),W/2,H*0.94);
  ctx.textAlign='left';
}
ui.submit.onclick=()=>{
  if(applied)return;
  tested=true;updateRO();draw();
  const m=mode();
  if(m==='ok'){
    solved=true;
    ui.status.textContent='✓ 恰好中和！'+(cap.full?'（已達上限）':'可套用強化');
    ui.status.className='ok';
    hintLog.success(`n(H⁺) = n(OH⁻) = ${nAcid().toFixed(2)} mmol，酸鹼恰好完全中和，pH = 7。`);
    if(!cap.full)ui.apply.disabled=false;
  } else {
    failCount++;solved=false;ui.apply.disabled=true;
    ui.status.textContent=`✗ 第 ${failCount} 次失敗 — ${m==='acid'?'酸過量 (pH<7)':'鹼過量 (pH>7)'}`;
    ui.status.className='bad';progressiveHint();
  }
};
ui.reset.onclick=()=>{failCount=0;hintLog.clear();reset();
  ui.status.textContent='調整濃度與體積，然後提交驗證';ui.status.className='hint';};
ui.apply.onclick=()=>{
  if(!solved||applied||cap.full)return;
  applied=true;ui.apply.disabled=true;cap.inc();
  ui.status.textContent='✓ 強化已套用！可關閉 (X)';ui.status.className='ok';
  parent.postMessage({type:'attackUpgrade',kind:'regen',amount:1,machine:'titration'},'*');
};
resize();refresh();
</script>
</body>
</html>
